{% extends 'base.html' %}

{% block content %}
{% if error %}
<div class="alert alert-warning mb-4">{{ error }}</div>
{% endif %}
<div class="upload-hero mb-4 fade-in">
  <div class="hero-left">
    <h2 class="mb-1">Analyze Downtime with clarity</h2>
    <p class="muted-small">Upload your CSV to instantly generate interactive charts and recommendations. Try the sample file in <strong>uploads</strong>.</p>
  </div>
  <div class="hero-right">
    <div class="card chart-card">
      <div class="card-body">
        <h5 class="card-title">Upload Downtime CSV</h5>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <input class="form-control" type="file" name="file" accept=".csv" required>
          </div>
          <div class="d-grid">
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-upload me-2"></i>Upload & Analyze</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
