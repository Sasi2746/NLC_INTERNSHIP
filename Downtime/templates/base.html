<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Downtime Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/ui.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  </head>
  <body id="page-body">
    <div class="app-shell">
      <aside class="app-sidebar" id="appSidebar">
        <div class="sidebar-header d-flex align-items-center">
          <img src="/static/logo.svg" alt="logo" style="height:28px;margin-right:8px" />
          <strong class="ms-1">NLC</strong>
        </div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="/"><i class="fa-solid fa-upload me-2"></i>Upload</a>
          <a class="nav-link" href="/analysis"><i class="fa-solid fa-chart-bar me-2"></i>Analysis</a>
          <a class="nav-link" href="/mapping"><i class="fa-solid fa-list-alt me-2"></i>Group Code Mapping</a>
        </nav>
        <div class="sidebar-footer mt-auto muted-small">v1.0</div>
      </aside>

      <div class="app-main">
        <header class="topbar d-flex align-items-center justify-content-between px-3">
          <div class="d-flex align-items-center gap-3">
            <div class="topbar-title"><span class="fw-bold">Downtime Analysis</span></div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn theme-toggle" id="themeToggle" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
          </div>
        </header>

        <main class="main-content container-fluid py-4">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Initialize theme from localStorage
      (function(){
        try{
          const theme = localStorage.getItem('dt_theme');
          if(theme === 'dark') document.documentElement.classList.add('dark-theme');
        }catch(e){}
      })();
      // Theme toggle
      document.addEventListener('DOMContentLoaded', function(){
        var tgl = document.getElementById('themeToggle');
        if(tgl){
          tgl.addEventListener('click', function(){
            var isDark = document.documentElement.classList.toggle('dark-theme');
            try{ localStorage.setItem('dt_theme', isDark ? 'dark' : 'light'); }catch(e){}
            this.querySelector('i').classList.toggle('fa-sun');
            this.querySelector('i').classList.toggle('fa-moon');
          });
        }
        // enable bootstrap tooltips
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        tooltipTriggerList.map(function (el) { return new bootstrap.Tooltip(el) })
      });
    </script>
  </body>
</html>
